name: Update README stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats cards
        run: |
          # Download stats card
          curl -o stats.svg "https://github-readme-stats.vercel.app/api?username=kadyrkaragishiev&show_icons=true&theme=tokyonight&count_private=true"
          
          # Download languages card  
          curl -o langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=kadyrkaragishiev&theme=tokyonight&layout=compact&langs_count=6"
          
          # Download streak card
          curl -o streak.svg "https://github-readme-streak-stats.herokuapp.com/?user=kadyrkaragishiev&theme=tokyonight"

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add stats.svg langs.svg streak.svg
          git commit -m "Update stats" || exit 0
          git push
